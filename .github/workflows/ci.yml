name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    env:
      NEXT_PUBLIC_GOOGLE_SHEETS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_SHEETS_API_KEY }}
      NEXT_PUBLIC_GOOGLE_SHEETS_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_SHEETS_ID }}
      NEXT_PUBLIC_GOOGLE_SHEETS_NAME: ${{ secrets.NEXT_PUBLIC_GOOGLE_SHEETS_NAME }}
      NEXT_PUBLIC_GOOGLE_SHEETS_RANGE: ${{ secrets.NEXT_PUBLIC_GOOGLE_SHEETS_RANGE }}
      NEXT_PUBLIC_GOOGLE_SCRIPT_URL_UMUM: ${{ secrets.NEXT_PUBLIC_GOOGLE_SCRIPT_URL_UMUM }}
      NEXT_PUBLIC_GOOGLE_SCRIPT_URL_GIGI: ${{ secrets.NEXT_PUBLIC_GOOGLE_SCRIPT_URL_GIGI }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
